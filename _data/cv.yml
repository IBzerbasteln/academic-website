    Publications:
      - title: "The Legal Classification of Hominin Fossils: Lessons from the Broken Hill Skull"
        authors:
          - Stewens, Paul P.
        publisher: International Journal of Heritage Studies
        releaseDate: 2026-05
        url: https://doi.org/10.1080/13527258.2026.2673358
        summary: This article explores the legal classification of hominin fossils, arguing they should be repatriated as cultural objects under international law.

      - title: "A Tale of Two Museums: Restitution and the Genealogy of the False Dichotomy between Natural History Museums and Cultural Museums"
        authors:
          - Stewens, Paul P.
        publisher: International Journal of Cultural Policy
        releaseDate: 2026-04
        url: https://doi.org/10.1080/10286632.2026.2653066
        summary: This article examines the disconnect between cultural and natural history museums regarding restitution, tracing the genealogy of museum diversification.

      - title: "Seizure without Restitution: Antiquities Dealer Leonardo Patterson’s Collection before the Munich Administrative Court"
        authors:
          - Stewens, Paul P.
          - Yates, Donna
        publisher: Harvard Art Law Review
        releaseDate: 2026-04-08
        url: https://orgs.law.harvard.edu/halo/files/2026/04/HALR-Vol.-II.pdf
        summary: This article discusses court cases surrounding the seizure of antiquities from Leonardo Patterson’s collection in Bavaria.

      - title: Foreign Sovereign Immunity in Exequatur Proceedings – Notes on the Hague District Court’s Decision of 5 June 2025
        authors:
          - Solaro, Livia
          - Stewens, Paul P.
        publisher: Cuadernos de Derecho Transnacional
        releaseDate: 2026-03-26
        url: https://doi.org/10.20318/cdt.2026.10299
        summary: The District Court of The Hague refused to recognise and enforce a Ukrainian ruling against Gazprom on foreign sovereign immunity grounds, highlighting the interplay between private and public international law.

      - title: Not a Toothless Law. Countering Illicit Fossil Trafficking under Regulation (EU) 2019/880
        authors:
          - Stewens, Paul P.
        publisher: transfer – Zeitschrift für Provenienzforschung und Sammlungsgeschichte | Journal for Provenance Research and the History of Collection
        releaseDate: 2025-12-12
        url: https://doi.org/10.48640/tf.2025.1.113827
        summary: This case study analyzes a French customs seizure of Moroccan fossils, evaluating the legal framework under EU Regulation 2019/880.

      - title: "A Classification Unearthed: The History of Palaeontological Objects as Cultural Property in International Law"
        authors:
          - Stewens, Paul P.
        publisher: London Review of International Law
        releaseDate: 2025-10-27
        url: https://doi.org/10.1093/lril/lraf02
        summary: This article traces how fossils became protected as cultural property under international law under the auspices of the League of Nations.

      - title: "My Genocide, My Responsibility -- <i>The 100</i>’s Massacre at Mount Weather and International Criminal Law"
        authors:
          - Stewens, Paul P.
        publisher: Opinio Juris
        releaseDate: 2024-10-29
        url: https://opiniojuris.org/2024/10/29/fourth-annual-symposium-on-pop-culture-and-international-law-my-genocide-my-responsibility-the-100s-massacre-at-mount-weather-and-international-criminal-law/
        summary: This blog post explores the depiction of genocide and international criminal law in the TV series *The 100*.

      - title: "Law Will Find A Way: Legal Research at the Intersection with Palaeontology"
        authors:
          - Stewens, Paul P.
          - Raja, Nussaïbah B.
          - Dunne, Emma M.
        publisher: "Interaktionen: Internationalität, Intra- Und Interdisziplinarität 63. Junge Tagung Öffentliches Recht"
        releaseDate: 2024-02
        url: https://doi.org/10.5771/9783748942733-343
        summary: This book chapter outlines Law and Palaeontology as a field addressing legal issues related to fossils and emphasises both the need for and potential of interdisciplinary collaboration.

      - title: "'<i>Ubirajara</i>' and <i>Irritator</i> Belong to Brazil: Achieving Fossil Returns Under German Private Law"
        authors:
          - Stewens, Paul Philipp
        publisher: International Journal of Cultural Property
        releaseDate: 2023-03
        url: https://doi.org/10.1017/S0940739124000031
        summary: This article explores private law as an alternative to repatriate unlawfully exported Brazilian fossils from German museums.

      - title: The Return of Fossils Removed Under Colonial Rule
        authors:
          - Stewens, Paul P.
          - Raja, Nussaïbah B.
          - Dunne, Emma M.
        publisher: Santander Art and Culture Law Review
        releaseDate: 2022-12
        url: https://doi.org/10.4467/2450050XSNR.22.013.17026
        summary: This article examines the colonial removal of fossils and potential avenues for their return under public international law and international human rights law.

      - title: "Reparation for Injuries Suffered in the Service of the Rescue Aid Society: Imagining the UN Through Disney’s <i>The Rescuers</i>"
        authors:
          - Stewens, Paul Philipp
        publisher: Opinio Juris
        releaseDate: 2022-10-27
        url: http://opiniojuris.org/2022/10/27/reparation-for-injuries-suffered-in-the-service-of-the-rescue-aid-society-imagining-the-un-through-disneys-the-rescuers/
        summary: This blog post uses Disney’s *The Rescuers* to discuss popular perceptions of international organizations.

      - title: "Pardoning War Criminals: The Trump Administration, the Duty to Prosecute, and the Duty to Protect Human Rights"
        authors:
          - Stewens, Paul Philipp
        publisher: IFHV Working Paper Series
        releaseDate: 2022-10-27
        url: https://doi.org/10.17176/20220924-202930-0
        summary: This working paper assesses Trump’s pardons for war criminals against the duty to prosecute grave violations of international humanitarian law.

      - title: "Ethics, Law, and Politics in Palaeontological Research: The Case of Myanmar Amber"
        authors:
          - Dunne, Emma M.
          - Raja, Nussaïbah B.
          - Stewens, Paul Philipp
          - Zin-Maung-Maung-Thein
          - Zaw, Khin
        publisher: Communications Biology
        releaseDate: 2022-09
        url: https://doi.org/10.1038/s42003-022-03847-2
        summary: This article highlights how Myanmar amber research is linked to political, legal, and economic changes.

      - title: "Two Ways of Thinking About Fossils: Palaeontological Objects Between Fossil Nationalism and Fossil Internationalism"
        authors:
          - Stewens, Paul Philipp
        publisher: Völkerrechtsblog
        releaseDate: 2022-03
        url: https://doi.org/10.17176/20220331-130937-0
        summary: This blog post discusses the dual perspectives of fossil nationalism and fossil internationalism in legal and ethical debates.

      - title: "Billigkeit, Sittlichkeit, Menschlichkeit: Versuch einer Kritik der Generalklauseln im Völkerrecht"
        authors:
          - Stewens, Paul Philipp
        publisher: Studentische Zeitschrift für Rechtswissenschaft Heidelberg -- Wissenschaft Online
        releaseDate: 2022-01
        url: https://doi.org/10.11588/SRZWO.2021.2.85612
        summary: This article critiques the politicization of law through general clauses in international law, applying Franz Neumann’s criticism.

      - title: "Is Your Dating App Swiping Left on Human Rights?"
        authors:
          - Katsoni, Spyridoula
          - Stewens, Paul Philipp
        publisher: Völkerrechtsblog
        releaseDate: 2021-12-01
        url: https://doi.org/10.17176/20211201-210752-0
        summary: This blog post examines how dating apps’ algorithms and policies may facilitate sexual and gender-based violence or violate privacy rights.

      - title: The Moral and Legal Imperative to Return Illegally Exported Fossils
        authors:
          - Cisneros, Juan C.
          - Ghilardi, Aline M.
          - Raja, Nussaïbah B.
          - Stewens, Paul P.
        publisher: Nature Ecology & Evolution
        releaseDate: 2021-11
        url: https://doi.org/10.1038/s41559-021-01588-9
        summary: This article argues for the return of illegally exported fossils, highlighting their scientific and cultural value.

      - title: "Burmese Amber: Palaeontology’s Blood Diamonds Through the Lens of International Law"
        authors:
          - Stewens, Paul Philipp
        publisher: Völkerrechtsblog
        releaseDate: 2021-06-24
        url: https://doi.org/10.17176/20210624-192927-0
        summary: This blog post compares Burmese amber to blood diamonds, discussing ethical and legal challenges in its trade.

      - title: "Now or Never: The Arms Trade Treaty at Crossroads"
        authors:
          - Stewens, Paul Philipp
        publisher: Völkerrechtsblog
        releaseDate: 2021-05-14
        url: https://doi.org/10.17176/20210514-090715-0
        summary: This blog post assesses the Arms Trade Treaty’s successes, challenges, and the urgent need to strengthen its implementation.