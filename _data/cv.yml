cv:
  name: Paul Stewens
  label: Researcher
  email: paul.stewens@pm.me
  location: Maastricht, The Netherlands
  summary: Paul P. Stewens is a doctoral candidate at the UNESCO Chair in Cultural Heritage and Emerging Crime (Dr Donna Yates) within the Faculty of Law at Maastricht University. His dissertation focuses on the regulation of natural history objects such as fossils, amber, meteorites, and human remains and explores how their ambiguity challenges legal classification. As one of the few experts in the field of law and natural history, his interdisciplinary work has appeared in both science and law journals. His research has also been featured in _Science_, _The Economist_, *CNN*, and *The Guardian*. He holds a Master in International Law from the Geneva Graduate Institute of International and Development Studies and has been actively involved in several high-profile fossil restitution controversies.

